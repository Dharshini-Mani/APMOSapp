<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APMOS – Login</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .logo-icon {
      width: 52px; height: 52px;
      border-radius: 12px;
      font-size: 24px;
      margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent);
      color: #000;
    }

    .login-logo h1 { font-size: 22px; font-weight: 800; }
    .login-logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }

    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; display: block; font-weight: 500; }

    .form-input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color var(--transition);
    }
    .form-input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity var(--transition);
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-toggle {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .form-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }

    .error-msg {
      background: rgba(255,77,106,0.1);
      border: 1px solid rgba(255,77,106,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }

    .tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab-link {
      flex: 1;
      text-align: center;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-link.active { color: var(--accent); border-bottom-color: var(--accent); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-icon">⚡</div>
      <h1>APMOS</h1>
      <p>Application Performance Monitoring System</p>
    </div>

    <div class="login-card">
      <div class="tabs">
        <div class="tab-link active" id="loginTab" onclick="switchTab('login')">Sign In</div>
        <div class="tab-link" id="registerTab" onclick="switchTab('register')">Register</div>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="form-group">
          <label class="form-label">Username or Email</label>
          <input type="text" class="form-input" id="loginUsername" placeholder="admin" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
        <div class="form-toggle">
          Default: <strong>admin</strong> / <strong>admin123</strong>
        </div>
      </div>

      <!-- Register Form -->
      <div id="registerForm" style="display:none;">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="regUsername" placeholder="yourname" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="regEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="regPassword" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="registerBtn" onclick="doRegister()">Create Account</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('apmos_token')) {
      window.location.href = 'index.html';
    }

    function switchTab(tab) {
      document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('registerTab').classList.toggle('active', tab === 'register');
      document.getElementById('errorMsg').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!username || !password) { showError('Please fill in all fields'); return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      document.getElementById('errorMsg').style.display = 'none';

      try {
        const res = await api.auth.login(username, password);
        localStorage.setItem('apmos_token', res.token);
        localStorage.setItem('apmos_user', JSON.stringify(res.user));
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message || 'Login failed');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function doRegister() {
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!username || !email || !password) { showError('Please fill in all fields'); return; }

      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      document.getElementById('errorMsg').style.display = 'none';

      try {
        const res = await api.auth.register(username, email, password);
        localStorage.setItem('apmos_token', res.token);
        localStorage.setItem('apmos_user', JSON.stringify(res.user));
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message || 'Registration failed');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (document.getElementById('loginForm').style.display !== 'none') doLogin();
        else doRegister();
      }
    });
  </script>
</body>
</html>
